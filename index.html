<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBot Smart Brain | Railway Edition</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .chat-container { width: 95%; max-width: 500px; background: #161b22; border: 1px solid #30363d; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        
        .header { text-align: center; padding-bottom: 15px; border-bottom: 1px solid #30363d; }
        .header h2 { color: #58a6ff; font-size: 22px; }
        .header p { font-size: 12px; color: #8b949e; margin-top: 5px; }

        #chatBox { height: 350px; overflow-y: auto; padding: 15px; margin: 15px 0; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
        
        /* Message Bubbles */
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.5; position: relative; }
        .user-msg { align-self: flex-end; background: #238636; color: white; border-bottom-right-radius: 2px; }
        .bot-msg { align-self: flex-start; background: #21262d; border: 1px solid #30363d; border-bottom-left-radius: 2px; }

        /* Input Area */
        .input-area { display: flex; flex-direction: column; gap: 10px; }
        textarea { width: 100%; height: 70px; background: #0d1117; border: 1px solid #30363d; border-radius: 12px; color: white; padding: 12px; font-size: 15px; resize: none; outline: none; transition: 0.3s; }
        textarea:focus { border-color: #58a6ff; }

        button { background: #238636; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #2ea043; transform: translateY(-2px); }
        button:disabled { background: #30363d; cursor: not-allowed; opacity: 0.6; }

        /* Loading Dots Animation */
        .typing { display: none; font-size: 12px; color: #8b949e; margin-left: 5px; }
        
        /* Custom Scrollbar */
        #chatBox::-webkit-scrollbar { width: 4px; }
        #chatBox::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h2>DevBot Smart Brain</h2>
        <p>● Connected to Railway Server</p>
    </div>
    
    <div id="chatBox">
        <div class="msg bot-msg">হ্যালো দেবদা! আমি তৈরি। আমাকে কিছু জিজ্ঞেস করুন।</div>
    </div>

    <div id="typingIndicator" class="typing">বট চিন্তা করছে...</div>

    <div class="input-area">
        <textarea id="userInput" placeholder="আপনার প্রশ্ন এখানে লিখুন..."></textarea>
        <button id="sendBtn" onclick="askSmartAI()">রান কমান্ড</button>
    </div>
</div>

<script>
    async function askSmartAI() {
        const inputField = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        const sendBtn = document.getElementById('sendBtn');
        const typing = document.getElementById('typingIndicator');
        const userMsg = inputField.value.trim();
        
        if(!userMsg) return;

        // ইউজারের মেসেজ অ্যাড করা
        chatBox.innerHTML += `<div class="msg user-msg">${userMsg}</div>`;
        inputField.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        // বাটন ও লোডিং কন্ট্রোল
        sendBtn.disabled = true;
        typing.style.display = "block";

        try {
            // তোমার নতুন রেলওয়ে লিঙ্কটি এখানে আপডেট করা হয়েছে
            const response = await fetch("https://determined-fulfillment-production-6987.up.railway.app/my-bot", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: userMsg })
            });

            const data = await response.json();
            
            // এআই উত্তর অ্যাড করা
            chatBox.innerHTML += `<div class="msg bot-msg">${data.response}</div>`;

        } catch (error) {
            console.error("Error:", error);
            chatBox.innerHTML += `<div class="msg bot-msg" style="color:#ff7b72;">সার্ভারে সমস্যা হয়েছে! রেলওয়ে লগ চেক করুন।</div>`;
        } finally {
            sendBtn.disabled = false;
            typing.style.display = "none";
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    // Enter চাপলে মেসেজ যাবে
    document.getElementById('userInput').addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            askSmartAI();
        }
    });
</script>

</body>
</html>
