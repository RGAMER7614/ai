<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBot Smart AI</title>
    <style>
        body { font-family: sans-serif; background: #0b0b0b; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; background: #161616; padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        #chatBox { height: 250px; overflow-y: auto; background: #1f1f1f; border-radius: 10px; padding: 10px; margin-bottom: 15px; text-align: left; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 5px; font-size: 14px; }
        .user { background: #00a2ff; color: white; margin-left: 15%; }
        .bot { background: #333; color: #ccc; margin-right: 15%; border-left: 3px solid #00a2ff; }
        textarea { width: 100%; height: 50px; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 10px; box-sizing: border-box; resize: none; }
        button { width: 100%; background: #00a2ff; color: white; border: none; padding: 10px; border-radius: 8px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h3 style="color:#00a2ff;">DevBot AI</h3>
        <div id="chatBox"></div>
        <textarea id="userInput" placeholder="জিজ্ঞেস করুন..."></textarea>
        <button onclick="askAI()">রান কমান্ড</button>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById('userInput').value;
            const chatBox = document.getElementById('chatBox');
            if(!input) return;

            chatBox.innerHTML += `<div class="msg user"><b>আপনি:</b> ${input}</div>`;
            document.getElementById('userInput').value = "";

            try {
                // রেলওয়ে থেকে ডোমেইন জেনারেট করে সেই লিঙ্কটি এখানে দাও
                const response = await fetch("https://তোমার-রেলওয়ে-লিঙ্ক.up.railway.app/my-bot", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: input })
                });
                const data = await response.json();
                chatBox.innerHTML += `<div class="msg bot"><b>বট:</b> ${data.response}</div>`;
            } catch (error) {
                chatBox.innerHTML += `<div class="msg bot" style="color:red;">সার্ভার কানেকশন এরর!</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
