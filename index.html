<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBot AI - Live</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 95%; max-width: 450px; background: #161b22; border: 1px solid #30363d; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { text-align: center; border-bottom: 1px solid #30363d; margin-bottom: 15px; padding-bottom: 10px; }
        #chatBox { height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .user-msg { align-self: flex-end; background: #238636; color: white; border-bottom-right-radius: 2px; }
        .bot-msg { align-self: flex-start; background: #21262d; border: 1px solid #30363d; border-bottom-left-radius: 2px; }
        .input-area { display: flex; flex-direction: column; gap: 10px; }
        textarea { width: 100%; height: 60px; background: #0d1117; border: 1px solid #30363d; border-radius: 10px; color: white; padding: 10px; resize: none; outline: none; }
        button { background: #238636; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h2 style="color: #58a6ff;">DevBot AI</h2>
        <p style="font-size: 10px; color: #238636;">● CONNECTED TO RAILWAY</p>
    </div>
    
    <div id="chatBox">
        <div class="msg bot-msg">সার্ভার রেডি দেবদা! কিছু জিজ্ঞেস করুন।</div>
    </div>

    <div class="input-area">
        <textarea id="userInput" placeholder="আপনার প্রশ্ন লিখুন..."></textarea>
        <button id="sendBtn" onclick="askAI()">রান কমান্ড</button>
    </div>
</div>

<script>
    async function askAI() {
        const input = document.getElementById('userInput');
        const box = document.getElementById('chatBox');
        const btn = document.getElementById('sendBtn');
        const msg = input.value.trim();
        
        if(!msg) return;

        box.innerHTML += `<div class="msg user-msg">${msg}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        btn.disabled = true;
        btn.innerText = "চিন্তা করছি...";

        try {
            // তোমার রেলওয়ে সার্ভারের লিঙ্কটি নিচে দেওয়া হলো
            const res = await fetch("https://determined-fulfillment-production-6987.up.railway.app/my-bot", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();
            box.innerHTML += `<div class="msg bot-msg">${data.response}</div>`;
        } catch (e) {
            box.innerHTML += `<div class="msg bot-msg" style="color:red;">সার্ভার এরর!</div>`;
        } finally {
            btn.disabled = false;
            btn.innerText = "রান কমান্ড";
            box.scrollTop = box.scrollHeight;
        }
    }
</script>

</body>
</html>
