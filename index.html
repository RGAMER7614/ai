<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBot Smart Brain</title>
    <style>
        body { font-family: sans-serif; background: #0b0b0b; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 450px; background: #161616; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        #chatBox { height: 300px; overflow-y: auto; background: #1f1f1f; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        .msg { margin-bottom: 12px; padding: 10px; border-radius: 8px; font-size: 14px; line-height: 1.5; }
        .user { background: #00a2ff; color: #fff; text-align: right; margin-left: 20%; }
        .bot { background: #333; color: #e0e0e0; border-left: 3px solid #00a2ff; margin-right: 20%; }
        textarea { width: 100%; height: 60px; background: #222; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 10px; resize: none; outline: none; box-sizing: border-box; }
        button { width: 100%; background: #00a2ff; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 10px; margin-top: 10px; font-weight: bold; }
        button:disabled { background: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:#00a2ff; text-align:center;">DevBot AI</h2>
    <div id="chatBox"></div>
    <textarea id="userInput" placeholder="জিজ্ঞেস করুন দেবদা..."></textarea>
    <button id="btn" onclick="askSmartAI()">রান কমান্ড</button>
</div>

<script>
    async function askSmartAI() {
        const input = document.getElementById('userInput').value;
        const display = document.getElementById('chatBox');
        const btn = document.getElementById('btn');
        if(!input) return;

        display.innerHTML += `<div class="msg user">${input}</div>`;
        document.getElementById('userInput').value = "";
        display.scrollTop = display.scrollHeight;

        btn.disabled = true;
        btn.innerText = "চিন্তা করছি...";

        try {
            const response = await fetch("https://ai-nnxd.onrender.com/my-bot", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: input })
            });
            const data = await response.json();
            display.innerHTML += `<div class="msg bot">${data.response}</div>`;
        } catch (error) {
            display.innerHTML += `<div class="msg bot" style="color:red;">সার্ভার অফলাইন!</div>`;
        } finally {
            btn.disabled = false;
            btn.innerText = "রান কমান্ড";
            display.scrollTop = display.scrollHeight;
        }
    }
</script>
</body>
</html>
