<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBot AI - Advanced</title>
    <style>
        :root { --bg: #0d1117; --sidebar: #161b22; --text: #e6edf3; --accent: #238636; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar); padding: 20px; border-right: 1px solid #30363d; display: flex; flex-direction: column; }
        .new-chat { border: 1px solid #30363d; padding: 10px; border-radius: 20px; text-align: center; cursor: pointer; font-weight: bold; }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chatBox { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 20px; }
        .msg { display: flex; gap: 15px; width: 100%; animation: fadeIn 0.3s; }
        .user-msg { justify-content: flex-end; }
        .bubble { max-width: 85%; padding: 15px; border-radius: 15px; line-height: 1.6; font-size: 15px; background: #21262d; }
        .user-bubble { background: var(--accent); border: none; }
        .bot-avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(45deg, #238636, #2ea043); flex-shrink: 0; }
        .input-area { padding: 20px 15%; }
        .input-box { background: #161b22; border: 1px solid #30363d; border-radius: 30px; padding: 10px 20px; display: flex; align-items: center; }
        textarea { flex: 1; background: none; border: none; color: white; outline: none; resize: none; height: 30px; font-size: 16px; }
        .send-btn { color: #58a6ff; background: none; border: none; font-size: 20px; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="new-chat" onclick="location.reload()">+ New Chat</div>
    <div style="margin-top: auto; font-size: 11px; color: #8b949e; text-align: center;">DevBot v2.0 - Free Search Mode</div>
</div>

<div class="main">
    <div id="chatBox">
        <div class="msg"><div class="bot-avatar"></div><div class="bubble">হ্যালো দেবদা! আমি রেডি। "ছবি দাও একটি ড্রাগনের" বা "খুঁজো SSC রেজাল্ট ২০২৬" লিখে ট্রাই করুন!</div></div>
    </div>
    <div class="input-area">
        <div class="input-box">
            <textarea id="userInput" placeholder="কিছু লিখুন দেবদা..."></textarea>
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script>
    let memory = [];

    function appendMessage(role, text, isImage = false) {
        const box = document.getElementById('chatBox');
        if(role === 'user') {
            box.innerHTML += `<div class="msg user-msg"><div class="bubble user-bubble">${text}</div></div>`;
        } else {
            let content = isImage ? `<p>আপনার জন্য ছবি দেবদা:</p><img src="${text}" style="width:100%; border-radius:10px; margin-top:10px;">` : text;
            box.innerHTML += `<div class="msg"><div class="bot-avatar"></div><div class="bubble">${content}</div></div>`;
        }
        box.scrollTop = box.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        appendMessage('user', text);
        input.value = "";

        // ১. ইমেজ জেনারেশন চেক
        if (text.toLowerCase().includes("ছবি") || text.toLowerCase().includes("image")) {
            const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(text)}?width=512&height=512&seed=${Date.now()}`;
            setTimeout(() => appendMessage('bot', imgUrl, true), 1000);
            return;
        }

        // ২. চ্যাট ও সার্চের জন্য সার্ভারে পাঠানো
        try {
            const res = await fetch("https://determined-fulfillment-production-6987.up.railway.app/my-bot", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text, history: memory })
            });
            const data = await res.json();
            
            appendMessage('bot', data.response);
            memory.push({ role: "user", content: text }, { role: "assistant", content: data.response });
            if(memory.length > 6) memory.shift(); 
        } catch (e) {
            appendMessage('bot', "সার্ভার কানেকশন এরর ব্রো!");
        }
    }
</script>
</body>
</html>
